<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CFIE v3.7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/static/css/common.css">
<link rel="stylesheet" href="/static/css/analyze.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <a href="/" class="logo" style="text-decoration:none">CFIE</a>
    <span class="ver">v3.7</span>
  </div>
  <nav class="topbar-nav">
    <a href="/"       class="nav-link" data-page="/">대시보드</a>
    <a href="/scan"   class="nav-link" data-page="/scan">신규 진입 종목 찾기</a>
    <a href="/mypage" class="nav-link" data-page="/mypage">마이 페이지</a>
  </nav>
  <div class="topbar-search">
    <form class="search-form" onsubmit="return false;">
      <input type="text" id="searchInput" class="search-input"
             placeholder="종목명 또는 티커 검색…" autocomplete="off">
      <button type="button" class="search-btn" onclick="doSearch()">⌕</button>
    </form>
    <div id="searchDropdown" class="search-dropdown hidden"></div>
  </div>
  <div class="topbar-right">
    <button class="back-btn" onclick="history.back()">← 뒤로</button>
  </div>
</header>

<!-- 로딩 -->
<div id="loadingOverlay" class="loading-overlay" style="display:flex">
  <div class="spinner"></div>
  <p style="margin-top:16px;color:var(--text2)">차트 데이터 분석 중…</p>
</div>

<main id="analyzeMain" style="display:none">

  <!-- 종목 헤더 -->
  <div class="stock-header">
    <div class="sh-left">
      <div class="sh-name" id="stockName">—</div>
      <div class="sh-meta">
        <span id="stockTicker"></span>
        <span id="stockExchange"></span>
        <span id="stockMeta"></span>
      </div>
      <div class="sh-price-row">
        <span class="sh-price"    id="stockPrice"></span>
        <span class="sh-currency" id="stockCurrency"></span>
        <span class="sh-daychg"   id="stockDayChg"></span>
      </div>
    </div>
    <div class="sh-right">
      <span id="holdingBadge" class="holding-badge" style="display:none">보유 중</span>
      <div id="fisBadge"  class="fis-badge">FIS —</div>
      <div id="labelChip" class="label-chip">—</div>
    </div>
  </div>

  <!-- 액션 바 -->
  <div class="action-bar">
    <button class="action-btn btn-buy-new"   onclick="openBuyModal()">📈 신규 진입</button>
    <button class="action-btn btn-buy-add"   onclick="openBuyModal()">＋ 추가 매수</button>
    <button class="action-btn btn-sell-part" onclick="openSellModal(false)">▼ 부분 매도</button>
    <button class="action-btn btn-sell-full" onclick="openSellModal(true)">✕ 전량 매도</button>
  </div>

  <!-- 차트 + 사이드바 (2-컬럼) -->
  <div class="analyze-body">

    <!-- 메인 컨텐츠 -->
    <div class="chart-main-col">
      <!-- 차트 제어 바 -->
      <div class="chart-control-bar">
        <div class="chart-control-label">차트 분석 기간</div>
        <select id="timeframeSelect" class="period-select-inline" onchange="reloadChart()">
          <option value="daily" selected>일봉</option>
          <option value="weekly">주봉</option>
          <option value="monthly">월봉</option>
          <option value="yearly">년봉</option>
        </select>
        <select id="periodSelect" class="period-select-inline" onchange="reloadChart()">
          <option value="6mo">6개월</option>
          <option value="1y">1년</option>
          <option value="2y" selected>2년</option>
          <option value="5y">5년</option>
        </select>
      </div>

      <!-- 차트 -->
      <div id="chartStage" class="chart-stage">
        <img id="mainChart" class="main-chart" alt="차트 로딩 중…">
        <div id="chartOverlay" class="chart-overlay">
          <div id="chartEventLayer" class="chart-event-layer"></div>
          <div id="chartCrosshairX" class="chart-crosshair chart-crosshair-x hidden"></div>
          <div id="chartCrosshairY" class="chart-crosshair chart-crosshair-y hidden"></div>
          <div id="chartXAxisLabel" class="chart-axis-label chart-axis-x hidden"></div>
          <div id="chartYAxisLabel" class="chart-axis-label chart-axis-y hidden"></div>
          <div id="chartHoverTooltip" class="chart-hover-tooltip hidden"></div>
          <!-- 평단가 및 추적손절 선 -->
          <div id="avglPriceLine" class="chart-overlay-line avg-price-line hidden"></div>
          <div id="trailingStopLine" class="chart-overlay-line trailing-stop-line hidden"></div>
        </div>
      </div>

      <!-- 데이터 테이블 -->
      <div class="table-wrap">
        <div class="table-title">📋 최근 30일 데이터</div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- 사이드바 (아래로 이동) -->
      <div class="sidebar-below">

        <!-- CFIE 종합 판단 -->
        <div class="sidebar-box">
          <div class="sbox-header">📊 CFIE 종합 판단</div>
          <div class="sbox-body">
            <p id="judgeL1" class="jc-l1"></p>
            <p id="judgeL2" class="jc-l2"></p>
            <p id="judgeExtra" class="jc-extra"></p>
          </div>
          <div id="scoreBars" class="score-bars"></div>
        </div>

        <!-- 진입 타이밍 분석 -->
        <div class="sidebar-box">
          <div class="sbox-header">🎯 진입 타이밍 분석</div>
          <div class="entry-score-row">
            <span class="entry-score-label">진입 점수</span>
            <div class="entry-score-badge" id="entryScoreBadge">—</div>
          </div>
          <div class="entry-status" id="entryStatus"></div>
          <div class="entry-metrics" id="entryMetrics"></div>
        </div>

        <!-- 주요 지표 -->
        <div class="sidebar-box">
          <div class="sbox-header">📈 주요 지표</div>
          <div id="indicatorChips" class="chip-grid"></div>
        </div>

      </div>

    </div>

  </div>

</main>

<!-- 매수/매도 모달 -->
<div id="tradeModal" class="modal-overlay" style="display:none">
  <div class="modal-box modal-box-wide">

    <!-- ── 매수 섹션 ── -->
    <div id="modalBuySection">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modalTitle">신규 진입</div>
          <div class="modal-sub" id="modalSubTicker"></div>
        </div>
        <div class="modal-scenario-chip" id="modalScenarioChip"></div>
      </div>

      <!-- 수량 입력 -->
      <div class="mbuy-qty-row">
        <label class="mbuy-qty-label">수량 (주)</label>
        <input type="number" id="modalQty" class="mbuy-qty-input" min="1" value="1"
               oninput="onModalQtyChange()">
        <span class="mbuy-invest" id="modalInvest">—</span>
      </div>

      <!-- 진입가 -->
      <div class="mbuy-price-row">
        <label class="mbuy-price-label">진입가</label>
        <input type="number" id="modalPrice" class="mbuy-price-input" min="0" step="1"
               oninput="onModalPriceChange()">
        <span class="mbuy-price-sub">현재가 기준 자동입력</span>
      </div>

      <!-- 트레일링 손절 미리보기 (등록 시 참고용) -->
      <div class="mbuy-trailing-preview">
        <div class="mbuy-trailing-label">📌 등록 후 마이페이지에서 실시간 자동 추적</div>
        <div class="mbuy-trailing-main">
          <div class="mbuy-trailing-item mbuy-ts-item">
            <span class="mbuy-trailing-key">트레일링 손절</span>
            <span class="mbuy-trailing-val" id="modalTrailingStop">—</span>
            <span class="mbuy-trailing-pct" id="modalTrailingPct"></span>
          </div>
          <div class="mbuy-trailing-item">
            <span class="mbuy-trailing-key">EMA20</span>
            <span class="mbuy-trailing-val" id="modalEMA20">—</span>
            <span class="mbuy-trailing-signal" id="modalEMASignal"></span>
          </div>
        </div>
        <div class="mbuy-trailing-desc">최근 20봉 고점 − ATR×2 기준 · 매일 자동 업데이트</div>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeTradeModal()">취소</button>
        <button class="btn-confirm" onclick="confirmBuy()">진입 등록</button>
      </div>
    </div>

    <!-- ── 매도 섹션 ── -->
    <div id="modalSellSection" style="display:none">
      <div class="modal-header">
        <div class="modal-title">매도</div>
        <div class="modal-sub" id="modalSellSub"></div>
      </div>
      <div class="modal-mode-note" id="modalSellModeNote"></div>
      <div class="form-row">
        <label>매도 수량 (주)</label>
        <input type="number" id="modalSellQty" class="modal-input" min="1" value="1">
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeTradeModal()">취소</button>
        <button class="btn-confirm" onclick="confirmSell()">매도 등록</button>
      </div>
    </div>

  </div>
</div>

<div id="toast" class="toast"></div>
<script src="/static/js/common.js"></script>
<script src="/static/js/analyze.js"></script>
</body>
</html>
