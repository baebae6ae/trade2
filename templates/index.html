<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CFIE v3.7 — 차트 첫인상 엔진</title>
<link rel="stylesheet" href="/static/css/common.css">
<link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <span class="logo">CFIE</span>
    <span class="ver">v3.7</span>
  </div>
  <nav class="topbar-nav">
    <a href="/"      class="nav-link" data-page="/">대시보드</a>
    <a href="/scan"  class="nav-link" data-page="/scan">신규 진입 종목 찾기</a>
    <a href="/mypage"class="nav-link" data-page="/mypage">마이 페이지</a>
  </nav>
  <div class="topbar-search">
    <form class="search-form" onsubmit="return false;">
      <input type="text" id="searchInput" class="search-input"
             placeholder="종목명 또는 티커 검색…" autocomplete="off">
      <button type="button" class="search-btn" onclick="doSearch()">⌕</button>
    </form>
    <div id="searchDropdown" class="search-dropdown hidden"></div>
  </div>
  <div class="topbar-right">
    <span id="clockText" class="clock"></span>
  </div>
</header>

<!-- 시장 티커 스트립 -->
<div class="ticker-strip">
  <div class="ticker-track" id="tickerTrack">
    <div class="ticker-item"><span class="ti-name">시장 데이터 로딩 중…</span></div>
  </div>
</div>

<main class="main-content">

  <!-- 한국 시장 -->
  <section class="section">
    <div class="section-header">
      <div class="section-accent"></div>
      <span class="section-title">🇰🇷 한국 시장</span>
    </div>
    <div class="index-grid" id="krGrid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </section>

  <!-- 미국 시장 -->
  <section class="section">
    <div class="section-header">
      <div class="section-accent"></div>
      <span class="section-title">🇺🇸 미국 시장</span>
    </div>
    <div class="index-grid" id="usGrid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </section>

  <!-- 내 포트폴리오 -->
  <section class="section">
    <div class="section-header">
      <div class="section-accent"></div>
      <span class="section-title">💼 내 포트폴리오</span>
    </div>
    <div id="portfolioWrap">
      <div class="portfolio-wrap">
        <div class="empty-portfolio">
          <div class="ep-icon">⏳</div>
          <div class="ep-title">로딩 중…</div>
        </div>
      </div>
    </div>
  </section>

</main>

<footer class="footer">
  본 서비스는 참고용 정보이며 투자 권유가 아닙니다. 투자 결과에 대한 책임은 투자자 본인에게 있습니다.
</footer>

<script src="/static/js/common.js"></script>
<script src="/static/js/dashboard.js"></script>
</body>
</html>
